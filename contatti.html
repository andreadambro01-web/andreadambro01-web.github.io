<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contattami - Andrea D'Ambrosio</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- CSS personale -->
<link rel="stylesheet" href="dist/css/style.css">

<!-- Favicon -->
<link rel="icon" href="img/favicon.ico">
</head>
<body>

<!-- Header -->
<header>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">Andrea D'Ambrosio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContact">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarContact">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="cv.html">CV</a></li>
        <li class="nav-item"><a class="nav-link" href="contatti.html">Contattami</a></li>
      </ul>
    </div>
  </div>
</nav>
</header>

<!-- Main -->
<main class="container my-5" style="text-align:left;">
  <h1 class="mb-4">Contattami</h1>

  <form id="contact-form" class="mb-4">
    <div class="mb-3">
      <label for="nome" class="form-label">Nome</label>
      <input type="text" class="form-control" id="nome" placeholder="Inserisci il tuo nome" required>
    </div>
    <div class="mb-3">
      <label for="email" class="form-label">Email</label>
      <input type="email" class="form-control" id="email" placeholder="Inserisci la tua email" required>
    </div>
    <div class="mb-3">
      <label for="messaggio" class="form-label">Messaggio</label>
      <textarea id="messaggio" class="form-control" rows="5" placeholder="Scrivi qui il tuo messaggio" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Invia</button>
  </form>

  <p id="status-msg" class="mt-3"></p>
</main>

<!-- Footer -->
<footer class="bg-primary text-white py-3">
  <div class="container" style="text-align: left;">
    &copy; 2026 Andrea D'Ambrosio
  </div>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3.2.0/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("c-NJzk-D12H1RQ-_X");
})();

document.getElementById('contact-form').addEventListener('submit', function(e) {
  e.preventDefault();
  const statusMsg = document.getElementById('status-msg');

  emailjs.send(
    'service_flytkot',
    'template_0nsf0xq',
    {
      from_name: document.getElementById('nome').value,
      from_email: document.getElementById('email').value,
      message: document.getElementById('messaggio').value
    }
  ).then(() => {
    statusMsg.textContent = "Messaggio inviato con successo!";
    statusMsg.style.color = "green";
    this.reset();
  }, (err) => {
    statusMsg.textContent = "Errore nell'invio del messaggio.";
    statusMsg.style.color = "red";
    console.error(err);
  });
});
</script>

</body>
</html>
