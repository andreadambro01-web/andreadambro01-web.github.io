<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <meta name="twitter:card" content="summary_large_image">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="dist/css/style.css">
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Andrea D'Ambrosio</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContact"
        aria-controls="navbarContact" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarContact">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="cv.html">CV</a></li>
          <li class="nav-item"><a class="nav-link active" href="contatti.html">Contattami</a></li>
        </ul>
      </div>
    </div>
  </nav>
</header>

<main class="section contact-page">
  <div class="container">

    <h1 class="mb-3">Contattami</h1>
    <p class="mb-4">Se vuoi collaborare con me o ricevere informazioni, compila il form qui sotto.</p>

    <form id="contact-form" class="contact-form">

      <div class="mb-3">
        <label for="nome" class="form-label">Nome</label>
        <input type="text" id="nome" name="nome" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" name="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="messaggio" class="form-label">Messaggio</label>
        <textarea id="messaggio" name="messaggio" class="form-control" rows="5" required></textarea>
      </div>

      <button type="submit" class="btn btn-dark-custom">
  Invia messaggio
</button>

      <p id="status-msg" class="mt-3"></p>

    </form>

  </div>
</main>

<footer class="footer text-white py-4">
  <div class="container text-center">
    &copy; 2026 Andrea D'Ambrosio
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3.2.0/dist/email.min.js"></script>

<script>
emailjs.init("c-NJzk-D12H1RQ-_X");

document.getElementById('contact-form').addEventListener('submit', function (e) {
  e.preventDefault();

  const statusMsg = document.getElementById('status-msg');

  emailjs.send('service_flytkot', 'template_0nsf0xq', {
    from_name: document.getElementById('nome').value,
    from_email: document.getElementById('email').value,
    message: document.getElementById('messaggio').value
  }).then(() => {
    statusMsg.textContent = "Messaggio inviato con successo!";
    statusMsg.style.color = "green";
    this.reset();
  }).catch(() => {
    statusMsg.textContent = "Errore nell'invio del messaggio.";
    statusMsg.style.color = "red";
  });
});
</script>

</body>
</html>
